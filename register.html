<!DOCTYPE html>
<html>
<head>
    <title>Register - Banking System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #1a73e8, #1557b0); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 90%; max-width: 450px; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        input, select { width: 100%; padding: 18px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #28a745; box-shadow: 0 0 10px rgba(40,167,69,0.2); }
        .btn { width: 100%; padding: 20px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px 0; }
        .btn:hover { background: #218838; transform: translateY(-2px); }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #1a73e8; text-decoration: none; font-weight: bold; }
        .alert { padding: 15px; border-radius: 10px; margin: 20px 0; text-align: center; font-weight: bold; }
        .alert-success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>👤 Create New Account</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="tel" name="phone" placeholder="+919876543210" pattern="\+91[0-9]{10}" required>
            </div>
            <div class="form-group">
                <select name="role" required>
                    <option value="" disabled selected>Account Type</option>
                    <option value="user">👤 Regular User</option>
                    <option value="admin">👨‍💼 Admin</option>
                </select>
            </div>
            <button type="submit" class="btn">✅ CREATE ACCOUNT</button>
        </form>
        
        <div class="login-link">
            <p>Already have account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</body>
</html>
